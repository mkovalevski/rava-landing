# Full RAVA stack: PostgreSQL + backend (API & Telegram bot) + nginx-served SPA.
#
#   docker compose up --build               # everything → http://<host-ip>:5199
#   docker compose up -d db                 # just the DB (for local `npm run dev`)
#   docker compose --profile proxy up -d    # also start the Xray/VLESS sidecar
#
# Secrets (Yandex / Telegram / JWT) are read from ./server/.env at runtime.
# Run EITHER this stack OR a local `npm start` — not both: one Telegram poller
# per bot token.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: rava
      POSTGRES_PASSWORD: rava
      POSTGRES_DB: rava
    ports:
      - "55432:5432" # host access for local dev / psql; container talks via :5432
    volumes:
      - rava-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rava -d rava"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  server:
    build: ./server
    env_file: ./server/.env # JWT_SECRET, YANDEX_*, TELEGRAM_*, YOOKASSA_DEMO …
    environment:
      # These override the dev values in .env for the compose network.
      PORT: 3001
      DATABASE_URL: postgres://rava:rava@db:5432/rava
      # Must match how you open the site. Set to your LAN/public IP or domain.
      # Over HTTPS the session cookie becomes Secure automatically; if you enable
      # Yandex, point YANDEX_REDIRECT_URI at <APP_URL>/api/auth/yandex/callback.
      APP_URL: http://192.168.31.145:5199
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build: .
    ports:
      - "5199:80" # open the site at http://<host-ip>:5199
    depends_on:
      - server
    restart: unless-stopped

  # Optional VLESS proxy for the Telegram bot (regions where Telegram is blocked).
  # Fill xray/config.json, set TELEGRAM_PROXY=socks5h://xray:1080 in server/.env,
  # then start with:  docker compose --profile proxy up -d --build
  xray:
    image: ghcr.io/xtls/xray-core:latest
    command: ["run", "-config", "/etc/xray/config.json"]
    volumes:
      - ./xray/config.json:/etc/xray/config.json:ro
    profiles: ["proxy"]
    restart: unless-stopped

volumes:
  rava-pgdata:
