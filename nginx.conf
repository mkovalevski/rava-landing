server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Static assets are content-hashed by Vite → cache them hard.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # API + OAuth callbacks → backend container (keeps the prefix intact).
  # Resolve `server` at request time via Docker's embedded DNS (127.0.0.11) and
  # use a variable in proxy_pass, so nginx starts even if the backend isn't up
  # yet (otherwise nginx hard-fails at boot with "host not found in upstream").
  location /api/ {
    resolver 127.0.0.11 valid=10s;
    set $upstream http://server:3001;
    proxy_pass $upstream$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA client-side routing: everything else falls back to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
